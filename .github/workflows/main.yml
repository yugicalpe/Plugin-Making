name: Build OpenRCT2 Crossover Plugin

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  bundle-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project source code
        uses: actions/checkout@v4

      - name: Setup Node.js workspace environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript to Single JavaScript File
        run: npm run build

      - name: Upload compiled plugin artifact
        uses: actions/artifacts@v4
        with:
          name: acnh-ssbu-plugin
          path: dist/*.js
          if-no-files-found: error
